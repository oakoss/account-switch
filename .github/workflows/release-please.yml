name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - run: bun x tsc --noEmit

      - run: pnpm lint

      - run: bun test

      - run: pnpm check-pkg

      # npm CLI for OIDC trusted publishing (pnpm doesn't support OIDC yet)
      # Setup: https://www.npmjs.com/package/account-switch/access → Trusted Publishers
      - run: npm publish --access public
